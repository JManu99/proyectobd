version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-container
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "TuPasswordSeguro123!"
      ACCEPT_EULA: "Y"
    volumes:
      - ./backups:/var/opt/mssql/backups
      - ./data:/var/opt/mssql/data